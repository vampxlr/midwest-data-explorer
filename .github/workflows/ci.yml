name: CI
# Runs on every push/PR: unit tests + server syntax + client build.
# The smoke suite needs a live server/data, so it stays a local ritual
# (npm run smoke) — see DEVELOPERS.md §6.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root deps
        run: npm install --no-audit --no-fund
      - name: Install server deps
        run: cd server && npm install --no-audit --no-fund
      - name: Install client deps
        run: cd client && npm install --no-audit --no-fund
      - name: Unit tests
        run: npm test
      - name: Server syntax + client build
        run: npm run check
